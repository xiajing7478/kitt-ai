<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 打字机效果</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    #chatBox { border: 1px solid #ddd; padding: 15px; border-radius: 8px; min-height: 100px; margin-bottom: 10px; white-space: pre-wrap; }
    .input-area { display: flex; gap: 10px; }
    input { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: #fff; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="chatBox">AI: </div>
<div class="input-area">
  <input id="userInput" placeholder="输入你想问的问题..." />
  <button id="sendBtn">发送</button>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  // 打字机效果函数
  function typeWriter(element, text, speed = 50) {
    return new Promise((resolve) => {
      let index = 0;
      function addChar() {
        if (index < text.length) {
          element.innerHTML += text.charAt(index);
          index++;
          setTimeout(addChar, speed);
        } else {
          resolve();
        }
      }
      addChar();
    });
  }

  sendBtn.onclick = async () => {
    const message = userInput.value.trim();
    if (!message) return;

    // 1. 界面初始化
    chatBox.innerHTML = `<b>你:</b> ${message}<br><br><b>AI:</b> `;
    userInput.value = '';
    sendBtn.disabled = true; // 防止连点

    try {
      // 2. 发起 POST 请求
      console.log('发送请求到服务器');
      const res = await fetch('http://localhost:5002/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      console.log('收到响应', res);

      // 3. 获取流读取器
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = ''; // 用于处理被截断的 SSE 数据
      let fullText = ''; // 收集完整文本

      // 4. 循环读取数据块
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunkStr = decoder.decode(value, { stream: true });
        console.log('收到数据块:', chunkStr);
        buffer += chunkStr;
        const lines = buffer.split('\n');
        buffer = lines.pop() || ''; // 保留最后一行（可能不完整）

        // 5. 解析 SSE 数据
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const dataStr = line.substring(6);
            console.log('解析数据:', dataStr);
            if (dataStr === '[DONE]') continue;
            
            try {
              const data = JSON.parse(dataStr);
              if (data.text) {
                fullText += data.text; // 收集文本
              }
            } catch (e) {
              console.log('解析错误:', e);
            }
          }
        }
      }

      // 6. 用打字机效果显示完整文本
      if (fullText) {
        await typeWriter(chatBox, fullText, 30);
      }
    } catch (error) {
      console.error('请求错误:', error);
      chatBox.innerHTML += `\n\n[错误: ${error.message}]`;
    } finally {
      sendBtn.disabled = false;
    }
  };

  // 支持回车发送
  userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });
</script>
</body>
</html>
